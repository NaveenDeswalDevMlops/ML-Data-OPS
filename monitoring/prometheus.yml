global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: heart-disease-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: heart-disease-api

  - job_name: heart-disease-model-service
    metrics_path: /metrics
    static_configs:
      - targets: ["model-service:8001"]
        labels:
          service: heart-disease-model-service

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
